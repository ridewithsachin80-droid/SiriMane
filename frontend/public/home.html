<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Siri Mane PG</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#F59E0B 0%,#D97706 40%,#1E3A5F 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:white;border-radius:24px;padding:40px 32px;width:100%;max-width:400px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
svg{margin-bottom:16px}
h1{font-size:28px;font-weight:800;color:#1E293B;margin-bottom:4px}
p{color:#64748B;font-size:14px;margin-bottom:6px}
.sub{color:#94A3B8;font-size:12px;margin-bottom:28px}
.label{font-size:11px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
.btn{display:block;width:100%;padding:16px;border-radius:12px;font-size:15px;font-weight:700;border:none;cursor:pointer;margin-bottom:12px;color:white;text-decoration:none}
.btn1{background:linear-gradient(135deg,#F59E0B,#D97706);box-shadow:0 4px 15px rgba(245,158,11,0.4)}
.btn2{background:linear-gradient(135deg,#1E3A5F,#0F2040);box-shadow:0 4px 15px rgba(30,58,95,0.4)}
.btn:active{opacity:0.9;transform:scale(0.98)}
.or{color:#CBD5E1;font-size:12px;margin:4px 0 12px;display:flex;align-items:center;gap:10px}
.or::before,.or::after{content:'';flex:1;height:1px;background:#E2E8F0}
footer{margin-top:20px;font-size:11px;color:#94A3B8}
</style>
</head>
<body>
<div class="card">
  <svg width="130" height="65" viewBox="0 0 130 65" xmlns="http://www.w3.org/2000/svg">
    <rect width="130" height="65" rx="10" fill="#F59E0B"/>
    <text x="65" y="17" font-family="serif" font-size="8" fill="#1E3A5F" text-anchor="middle" font-weight="bold">ಸಿರಿ ಮಾನೆ</text>
    <text x="65" y="36" font-family="Georgia,serif" font-size="17" fill="#1E3A5F" text-anchor="middle" font-weight="bold" font-style="italic">Siri Mane</text>
    <text x="65" y="49" font-family="serif" font-size="8" fill="#1E3A5F" text-anchor="middle">Ladies Paying Guest</text>
    <text x="65" y="60" font-family="serif" font-size="7" fill="#1E3A5F" text-anchor="middle">ಸಿರಿ ಮನೆ</text>
  </svg>
  <h1>Siri Mane</h1>
  <p>Ladies PG Accommodation · Bengaluru</p>
  <p class="sub">ಸಿರಿ ಮನೆ · ಬೆಂಗಳೂರು</p>
  <p class="label">Choose how to continue</p>
  <a href="/guest.html" class="btn btn1">🏠 &nbsp; I'm a Guest</a>
  <div class="or">or</div>
  <a href="/management.html" class="btn btn2">🔐 &nbsp; Management Login</a>
  <footer>sirimane.in · Bengaluru, Karnataka</footer>
</div>
</body>
</html>
