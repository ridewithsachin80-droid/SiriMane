<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Siri Mane PG</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #F59E0B 0%, #D97706 40%, #1E3A5F 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: white; border-radius: 20px; padding: 40px 36px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
    .logo-wrap { margin-bottom: 24px; }
    h1 { font-size: 28px; font-weight: 700; color: #1E293B; margin-bottom: 4px; }
    .sub { color: #64748B; font-size: 14px; margin-bottom: 32px; }
    .btn { display: block; width: 100%; padding: 15px; border-radius: 12px; font-size: 15px; font-weight: 600; text-decoration: none; text-align: center; margin-bottom: 14px; cursor: pointer; border: none; font-family: inherit; transition: all 0.2s; }
    .btn-guest { background: #F59E0B; color: white; box-shadow: 0 4px 14px rgba(245,158,11,0.4); }
    .btn-guest:hover { background: #D97706; }
    .btn-mgmt { background: #1E3A5F; color: white; box-shadow: 0 4px 14px rgba(30,58,95,0.3); }
    .btn-mgmt:hover { background: #152D4A; }
    .divider { display: flex; align-items: center; gap: 10px; color: #9CA3AF; font-size: 12px; margin: 4px 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #E2E8F0; }
    footer { margin-top: 24px; font-size: 11px; color: #9CA3AF; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <svg width="160" height="80" viewBox="0 0 160 80" xmlns="http://www.w3.org/2000/svg">
        <rect width="160" height="80" rx="10" fill="#F59E0B"/>
        <text x="80" y="20" font-family="serif" font-size="10" fill="#1E3A5F" text-anchor="middle" font-weight="bold">ಸಿರಿ ಮಾನೆ</text>
        <text x="80" y="42" font-family="Georgia, serif" font-size="20" fill="#1E3A5F" text-anchor="middle" font-weight="bold" font-style="italic">Siri Mane</text>
        <text x="80" y="58" font-family="serif" font-size="9" fill="#1E3A5F" text-anchor="middle">Ladies Paying Guest</text>
        <text x="80" y="72" font-family="serif" font-size="8" fill="#1E3A5F" text-anchor="middle">ಸಿರಿ ಮನೆ</text>
      </svg>
    </div>
    <h1>Siri Mane</h1>
    <p class="sub">Ladies PG Accommodation · Bengaluru</p>
    <a href="/guest.html" class="btn btn-guest">🏠 I'm a Guest</a>
    <div class="divider">or</div>
    <a href="/index.html" class="btn btn-mgmt">🔐 Management Login</a>
    <footer>ಸಿರಿ ಮನೆ · sirimane.in</footer>
  </div>
</body>
</html>
