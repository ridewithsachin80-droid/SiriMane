<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Siri Mane - PG Management</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="login-page" class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <!-- Siri Mane Logo - Yellow background with Kannada text -->
      <svg width="160" height="80" viewBox="0 0 160 80" xmlns="http://www.w3.org/2000/svg">
        <rect width="160" height="80" rx="10" fill="#F59E0B"/>
        <text x="80" y="22" font-family="serif" font-size="11" fill="#1E3A5F" text-anchor="middle" font-weight="bold">ಸಿರಿ ಮಾನೆ</text>
        <text x="80" y="42" font-family="Georgia, serif" font-size="20" fill="#1E3A5F" text-anchor="middle" font-weight="bold" font-style="italic">Siri Mane</text>
        <text x="80" y="58" font-family="serif" font-size="9" fill="#1E3A5F" text-anchor="middle">Ladies Paying Guest</text>
        <text x="80" y="72" font-family="serif" font-size="8" fill="#1E3A5F" text-anchor="middle">ಸಿರಿ ಮನೆ</text>
      </svg>
    </div>
    <h2 style="font-size:18px;font-weight:700;margin-bottom:4px;text-align:center">Management Login</h2>
    <p style="font-size:13px;color:#64748B;text-align:center;margin-bottom:22px">Enter your password to access the dashboard</p>
    <div id="login-alert" class="alert alert-danger hidden"></div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="login-username" placeholder="admin" autocomplete="username"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;padding:11px" id="login-btn">🔐 Login</button>
    <p style="text-align:center;margin-top:16px;font-size:12px;color:#94A3B8">Siri Mane PG Management System</p>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" class="app hidden">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <svg width="100%" height="70" viewBox="0 0 180 70" xmlns="http://www.w3.org/2000/svg">
        <rect width="180" height="70" rx="8" fill="#F59E0B"/>
        <text x="90" y="18" font-family="serif" font-size="10" fill="#1E3A5F" text-anchor="middle" font-weight="bold">ಸಿರಿ ಮಾನೆ</text>
        <text x="90" y="38" font-family="Georgia, serif" font-size="19" fill="#1E3A5F" text-anchor="middle" font-weight="bold" font-style="italic">Siri Mane</text>
        <text x="90" y="52" font-family="serif" font-size="9" fill="#1E3A5F" text-anchor="middle">Ladies Paying Guest</text>
        <text x="90" y="64" font-family="serif" font-size="8" fill="#1E3A5F" text-anchor="middle">ಸಿರಿ ಮನೆ</text>
      </svg>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item active" data-page="dashboard"><span class="icon">📊</span> Dashboard</button>
      <button class="nav-item" data-page="rooms"><span class="icon">🛏️</span> Rooms</button>
      <button class="nav-item" data-page="guests"><span class="icon">👥</span> Guests</button>
      <button class="nav-item" data-page="daily-menu"><span class="icon">🍽️</span> Daily Menu</button>
      <button class="nav-item" data-page="payments"><span class="icon">💰</span> Payments</button>
      <button class="nav-item" data-page="guest-messages"><span class="icon">📢</span> Guest Messages</button>
      <button class="nav-item" data-page="inbox"><span class="icon">📥</span> Inbox <span id="inbox-badge" class="hidden" style="background:#EF4444;color:white;font-size:10px;padding:1px 6px;border-radius:10px;margin-left:2px"></span></button>
      <div class="nav-section">ACCOUNTS</div>
      <button class="nav-item" data-page="purchases"><span class="icon">🛒</span> Purchases</button>
      <button class="nav-item" data-page="collections"><span class="icon">💵</span> Collections</button>
      <button class="nav-item" data-page="reports"><span class="icon">📋</span> Reports</button>
    </nav>
    <div class="sidebar-footer">
      <button class="logout-btn" id="logout-btn">🚪 Logout</button>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div class="flex items-center gap-2">
        <button id="menu-toggle" style="background:none;border:none;font-size:20px;cursor:pointer;padding:4px 8px;border-radius:6px;">☰</button>
        <div>
          <span id="page-title" style="font-weight:600;font-size:15px"></span>
        </div>
      </div>
      <div class="flex items-center gap-2" id="topbar-right">
        <span id="topbar-user" style="font-size:13px;color:#64748B"></span>
        <div id="topbar-actions"></div>
      </div>
    </header>
    <div class="content" id="page-content">
      <div class="loading-center"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<div id="modal-container"></div>
<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
